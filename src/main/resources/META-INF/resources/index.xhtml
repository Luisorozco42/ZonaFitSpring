<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<!-- Por fin esta parte de los xmlns no dan error visual, creo que necesitaba los plugins en un punto pero varias
cosas en el pom eran necesarias para hacerlo funcionar tambien. Cabe a destacar que esto esta actualizado no como
en el curso que es solo java 21 con versiones mas viejas de todas las tecnologias que estoy usando aqui-->
<html lang="en-us"

      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<f:view contentType="text/html">
    <h:head>
        <title>Zona Fit (GYM)</title>
        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
    </h:head>
    <h:body>

        <div class="card">
            <h:form id="forma-clientes">
                <p:growl id="mensajes" showDetail="true"/>
                <div class="card">
                    <p:menubar>
                        <p:menuitem value="Inicio" icon="pi pi-fw pi-user" update=":forma-clientes:clientes-tabla"
                                    actionListener="#{indexControlador.cargarDatos()}"/>
                        <p:menuitem value="Nuevo cliente" icon="pi pi-fw pi-plus"
                                    actionListener="#{indexControlador.agregarCliente}"
                                    update=":forma-modal:cliente-ventana"
                                    oncomplete="PF('ventanaModalCliente').show()"/>
                    </p:menubar>
                    <!-- DataTable -->
                    <div class="card">
                        <p:dataTable value="#{indexControlador.clientes}" var="cliente" id="clientes-tabla"
                                     widgetVar="clientesTabla">
                            <f:facet name="header">
                                <div class="flex justify-content-center flex-wrap card-container yellow-container">
                                    <div class="flex align-items-center justify-content-center w-20rem h-4rem
                                    bg-yellow-500 font-bold
                                    text-gray-900 border-round m-2">
                                        <h3>(Zona Fit GYM)</h3>
                                    </div>
                                </div>
                            </f:facet>

                            <p:column headerText="Id">
                                <h:outputText value="#{cliente.id}"/>
                            </p:column>

                            <p:column headerText="Nombre">
                                <h:outputText value="#{cliente.nombre}"/>
                            </p:column>

                            <p:column headerText="Apellido">
                                <h:outputText value="#{cliente.apellido}"/>
                            </p:column>

                            <p:column headerText="Membresia">
                                <h:outputText value="#{cliente.membresia}"/>
                            </p:column>

                            <p:column headerText="Acciones">
                                <p:commandButton value="Editar" icon="pi pi-pencil" update=":forma-modal:cliente-ventana"
                                process="@this" oncomplete="PF('ventanaModalCliente').show()" class="ui-button-primary"
                                style="margin-right: .5rem">
                                    <f:setPropertyActionListener target="#{indexControlador.clienteSeleccionado}" value="#{cliente}"/>
                                    <p:resetInput target=":forma-modal:cliente-ventana"/>
                                </p:commandButton>

                                <p:commandButton value="Eliminar" icon="pi pi-trash">
                                    <f:setPropertyActionListener target=":forma-cliente:clientes-tabla" value="1"/>
                                </p:commandButton>
                            </p:column>

                        </p:dataTable>
                    </div>
                </div>
            </h:form>
            <h:form id="forma-modal">
                <p:dialog header="Detalles Cliente" showEffect="fade" modal="true" widgetVar="ventanaModalCliente"
                          responsive="true">
                    <p:outputPanel id="cliente-ventana" class="ui-fluid">
                        <div class="field">
                            <p:outputLabel for="nombre">Nombre</p:outputLabel>
                            <p:inputText id="nombre" value="#{indexControlador.clienteSeleccionado.nombre}"
                                         required="true"/>
                        </div>

                        <div class="field">
                            <p:outputLabel for="apellido">Apellido</p:outputLabel>
                            <p:inputText id="apellido" value="#{indexControlador.clienteSeleccionado.apellido}"
                            required="true"/>
                        </div>

                        <div class="field">
                            <p:outputLabel for="membresia">Membresía</p:outputLabel>
                            <p:inputNumber id="membresia" value="#{indexControlador.clienteSeleccionado.membresia}"
                            required="true"/>
                        </div>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <p:commandButton value="Guardar" icon="pi pi-check" process="cliente-ventana @this"
                        actionListener="#{indexControlador.guardarCliente()}"/>
                        <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('ventanaModalCliente').hide()"
                                         class="ui-button-secondary" type="button"/>

                    </f:facet>
                </p:dialog>
            </h:form>
        </div>
    </h:body>

</f:view>
</html>
