spring.application.name=zona_fit
#Conexion mysql
spring.datasource.url=jdbc:mysql://localhost:3306/zona_fit_bd
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Evitar crear el esquema de base de datos
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
#desactivar tomcat
#spring.main.web-application-type=none se desactiva para que funcione la version web
joinfaces.faces-servlet.enabled=true